<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>색상 팔레트 생성기</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>색상 팔레트 생성기</h1>

    <div class="card">
      <h2>기준 색상</h2>
      <div class="color-input-row">
        <div class="picker-wrap">
          <input type="color" id="colorPicker" value="#7dd3fc">
        </div>
        <input type="text" id="hexInput" class="hex-text" placeholder="#7DD3FC" maxlength="7">
        <button id="randomBtn" class="secondary-btn">랜덤</button>
      </div>
    </div>

    <div class="card">
      <h2>색상 조화 유형</h2>
      <div class="type-buttons">
        <button class="type-btn active" data-type="monochromatic">단색</button>
        <button class="type-btn" data-type="complementary">보색</button>
        <button class="type-btn" data-type="analogous">유사색</button>
        <button class="type-btn" data-type="triadic">삼각형</button>
        <button class="type-btn" data-type="tetradic">사각형</button>
        <button class="type-btn" data-type="split">분열 보색</button>
      </div>
    </div>

    <div class="palette-section">
      <div class="palette-header">
        <h2 id="paletteTitle">단색 (Monochromatic) 팔레트</h2>
        <button id="exportBtn" class="export-btn">CSS 변수로 복사</button>
      </div>
      <div class="palette-grid" id="paletteGrid"></div>
    </div>

    <div id="toast" class="toast">클립보드에 복사되었습니다!</div>
  </div>

  <script src="script.js"></script>
</body>
</html>
